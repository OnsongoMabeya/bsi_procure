version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bsi_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: bsi_procurement
      MYSQL_USER: bsi_user
      MYSQL_PASSWORD: bsi_dev_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
