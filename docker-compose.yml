services:
  mysql:
    image: mysql:8.0
    container_name: bsi_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-bsi_procurement}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: bsi_ollama
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      LLM_OLLAMA_MODEL: ${LLM_OLLAMA_MODEL:-llama3.1}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bsi_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql
      LLM_PROVIDER: ollama
      LLM_OLLAMA_URL: http://ollama:11434
      LLM_OLLAMA_MODEL: ${LLM_OLLAMA_MODEL:-llama3.1}
    ports:
      - "5005:5005"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bsi_frontend
    restart: unless-stopped
    ports:
      - "3005:3005"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
  ollama_data:
