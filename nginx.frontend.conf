server {
    listen 3005;
    server_name _;
    client_max_body_size 100M;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache the SPA entry point so updates load immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # Proxy all /api requests to the backend container
    location /api/ {
        proxy_pass http://backend:5005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # AI scans can take 60+ seconds with local models
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy uploaded documents from backend static file server
    location /uploads/ {
        proxy_pass http://backend:5005/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # React SPA — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
